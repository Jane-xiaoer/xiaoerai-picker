<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#e3d2a8">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#e3d2a8"/>
    <g stroke="#2e1e10" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lamp -->
      <g stroke-width="6">
        <path d="M 720 230 L 920 230 L 900 340 L 740 340 Z" fill="#ece2c8"/>
        <ellipse cx="820" cy="230" rx="22" ry="6" fill="#ece2c8"/>
        <rect x="812" y="340" width="16" height="240" fill="#ece2c8"/>
        <ellipse cx="820" cy="586" rx="86" ry="14" fill="#ece2c8"/>
        <!-- pull cord -->
        <line x1="892" y1="340" x2="892" y2="460"/>
        <rect x="884" y="460" width="16" height="28" fill="#ece2c8"/>
      </g>
      <!-- light halo behind lamp -->
      <circle cx="820" cy="300" r="240" fill="#f4d68a" opacity=".55" stroke="none"/>
      <!-- drawer (cabinet front) -->
      <g stroke-width="6">
        <rect x="280" y="600" width="640" height="140" fill="#ece2c8"/>
        <rect x="300" y="620" width="600" height="100" fill="none" stroke-width="2"/>
        <ellipse cx="600" cy="670" rx="56" ry="14" fill="#ece2c8"/>
        <ellipse cx="600" cy="670" rx="50" ry="10" fill="none" stroke-width="2"/>
      </g>
      <!-- corner ornaments -->
      <g stroke-width="2" opacity=".6">
        <path d="M 60 60 Q 100 80 110 120"/>
        <circle cx="110" cy="120" r="4" fill="#2e1e10"/>
        <path d="M 1140 60 Q 1100 80 1090 120"/>
        <circle cx="1090" cy="120" r="4" fill="#2e1e10"/>
        <path d="M 60 740 Q 100 720 110 680"/>
        <circle cx="110" cy="680" r="4" fill="#2e1e10"/>
        <path d="M 1140 740 Q 1100 720 1090 680"/>
        <circle cx="1090" cy="680" r="4" fill="#2e1e10"/>
      </g>
      <!-- title -->
      <text x="600" y="160" text-anchor="middle"
            font-family="'Cormorant Garamond', Georgia, serif"
            font-style="italic"
            font-size="56"
            fill="#2e1e10"
            stroke="none">Cabinet of Curiosities</text>
      <line x1="380" y1="186" x2="820" y2="186" stroke-width="1.5"/>
    </g>
  </svg>
</template>
<div id="root"></div>

<!-- Global SVG defs: engraving patterns, hand-drawn wobble filter, ornaments -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- Hand-drawn wobble: subtle displacement map, applied to illustration groups -->
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4"/>
      <feDisplacementMap in="SourceGraphic" scale="1.6"/>
    </filter>
    <filter id="wobbleHeavy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2.4"/>
    </filter>
    <filter id="roughen" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale=".6"/>
    </filter>
    <filter id="inkBleed" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation=".35"/>
    </filter>
    <filter id="paperAge">
      <feTurbulence baseFrequency="1.2" numOctaves="2" seed="5"/>
      <feColorMatrix values="0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0 0.08  0 0 0 .5 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Cross-hatch patterns at 3 densities -->
    <pattern id="hatch1" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2e1e10" stroke-width=".5"/>
    </pattern>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2e1e10" stroke-width=".6"/>
    </pattern>
    <pattern id="hatch3" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#2e1e10" stroke-width=".7"/>
      <line x1="0" y1="0" x2="3" y2="0" stroke="#2e1e10" stroke-width=".4" opacity=".5"/>
    </pattern>
    <pattern id="hatchHoriz" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="0" stroke="#2e1e10" stroke-width=".5"/>
    </pattern>
    <pattern id="hatchVert" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2e1e10" stroke-width=".5"/>
    </pattern>
    <!-- Stippling (dots) for softer shading -->
    <pattern id="stipple1" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="2" r=".6" fill="#2e1e10"/>
      <circle cx="7" cy="6" r=".5" fill="#2e1e10"/>
      <circle cx="4" cy="8" r=".4" fill="#2e1e10"/>
    </pattern>
    <pattern id="stipple2" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1.5" cy="1.5" r=".5" fill="#2e1e10"/>
      <circle cx="4" cy="3.5" r=".6" fill="#2e1e10"/>
      <circle cx="2" cy="4.5" r=".4" fill="#2e1e10"/>
      <circle cx="5" cy="1" r=".4" fill="#2e1e10"/>
    </pattern>
    <pattern id="stippleDense" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r=".6" fill="#2e1e10"/>
      <circle cx="3" cy="2.5" r=".5" fill="#2e1e10"/>
      <circle cx="2" cy="3" r=".4" fill="#2e1e10"/>
      <circle cx="3.5" cy=".5" r=".3" fill="#2e1e10"/>
    </pattern>

    <!-- Woodgrain: irregular horizontal dark lines (for drawer front) -->
    <pattern id="woodgrain" patternUnits="userSpaceOnUse" width="80" height="14">
      <rect width="80" height="14" fill="transparent"/>
      <path d="M 0 3 Q 20 2 40 4 Q 60 5 80 3" fill="none" stroke="#2e1e10" stroke-width=".6" opacity=".6"/>
      <path d="M 0 8 Q 25 9 50 7 Q 70 6 80 8" fill="none" stroke="#2e1e10" stroke-width=".4" opacity=".4"/>
      <path d="M 0 12 Q 15 11 30 13 Q 55 14 80 12" fill="none" stroke="#2e1e10" stroke-width=".5" opacity=".5"/>
    </pattern>

    <!-- Corner ornament (engraved leafy flourish) -->
    <symbol id="cornerOrn" viewBox="0 0 80 80">
      <g stroke="#2e1e10" stroke-width="1" fill="none" stroke-linecap="round">
        <path d="M 8 8 Q 24 14 28 30 Q 30 42 40 46"/>
        <path d="M 8 8 L 22 8 M 8 8 L 8 22"/>
        <!-- leaves -->
        <path d="M 16 18 Q 22 14 24 22 Q 22 26 16 22 Z" fill="#2e1e10" opacity=".3"/>
        <path d="M 26 28 Q 34 24 36 34 Q 32 38 24 34 Z" fill="#2e1e10" opacity=".3"/>
        <circle cx="40" cy="46" r="1.6" fill="#2e1e10"/>
      </g>
    </symbol>

    <!-- Drop-shadow for ink illustration on paper -->
    <filter id="inkShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="2"/>
      <feColorMatrix values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.03  0 0 0 .3 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<script type="text/babel" src="src/util.jsx"></script>
<script type="text/babel" src="src/engraving.jsx"></script>
<script type="text/babel" src="src/lamp.jsx"></script>
<script type="text/babel" src="src/scene.jsx"></script>
<script type="text/babel" src="src/drawer.jsx"></script>
<script type="text/babel" src="src/cards.jsx"></script>
<script type="text/babel" src="src/pages.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
<script>
  // Dev-only cache-buster: when running on localhost, append ?v=<timestamp> to all
  // type="text/babel" scripts BEFORE Babel scans them on DOMContentLoaded. Prevents
  // disk-cached jsx from masking edits. No-op in production.
  (function () {
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;
    var t = Date.now();
    document.querySelectorAll('script[type="text/babel"]').forEach(function (s) {
      s.src = s.src.split('?')[0] + '?v=' + t;
    });
  })();
</script>
</body>
</html>
